appId: ${appId}
---
- launchApp:
    appId: ${appId}
- tapOn: 
      text: "Arena.*"
      id: home-account-tab-btn

# check popup Heart
- assertVisible: Start -1
- tapOn: Start -1

# màn hướng dẫn
- assertVisible: Next >>
- tapOn: Next >>
- tapOn: Next >>
- tapOn: Next >>
- tapOn: Next >>
- tapOn: Next >>

# màn game
# 4. Vao man game
- repeat:
    while:
      notVisible: "Question 5"
    commands:
      - scrollUntilVisible:
          element:
            id: mst-Answer-Correct
          direction: DOWN
      - repeat:
          while:
            notVisible:
              text: "Explanation:"
          commands:
            - tapOn:
                id: "mst-Answer-Correct"

      - runFlow: ../ClosePopup/CloseBadge.yaml
      - tapOn: "Next"

- tapOn:
    id: mst-Answer-Incorrect
