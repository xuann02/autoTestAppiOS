appId: ${appId}
---
# check click button Previous
- repeat:
    while:
      visible: "Previous"
    commands:
      - tapOn: Previous

# click icon Submit hiển thị popup Submit
- tapOn: 
    id: game-submit-btn
- assertVisible: SUBMIT
- tapOn:
    text: Dismiss

# click icon Back hiển thị popup Submit
- tapOn: 
    id: mst-Back

- assertVisible: SUBMIT
- tapOn:
    text: Dismiss
