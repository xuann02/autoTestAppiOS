appId: ${appId}
# appId: com.sima.ccna
---
- launchApp:
    appId: ${appId}
- tapOn: 
      text: "Study.*"
      id: home-study-tab-btn
- waitForAnimationToEnd
# Click vào 1 topic bất kỳ check icon audio
- tapOn:
    below: "Daily Challenge"
    text: ".*%"
    # index: 3
    optional: true

# nếu có Continue → là case topic
- repeat:
    while:
      visible: "Theory"
    commands:
      - tapOn:
          text: Continue
          optional: true

# Case 2: app dạng Core map (không có topic list)
- tapOn:
    text: ".*Core 1"
    optional: true

- assertVisible: 
    id: game-audio-btn
- tapOn: 
    id: game-audio-btn
- assertVisible: Audio Mode
