appId: ${appId}
---
- launchApp:
    appId: ${appId}
- tapOn: 
    text: "Tests.*"
    id: home-test-tab-btn

- swipe:
    direction: UP
#Check hiển thị Final test khi đã Submit
- tapOn:
    text: "Our final test is the ultimate gauge that assesses your readiness for the actual exam.*"

- repeat:
    while:
      visible: "Final Tests"
    commands:
      - tapOn:
          below: "Final Tests.*"
          index: 2
          optional: true

# click button Try again
- assertVisible: Try Again
- tapOn: Try Again

- runFlow:
    commands:
      # hiển thị màn mua
      - assertVisible: Pass For The First Time With
      - tapOn: 
          id: iap-close-btn
    optional: true
- runFlow:
    commands:
      - tapOn:
          text: "Start"
          optional: true
      - repeat:
          times: 5
          commands:
            #  1. Scroll đảm bảo load answer
            - scrollUntilVisible:
                element:
                  id: "mst-Answer.*"
                  index: 0
                direction: DOWN

            # 2. Đếm số đáp án (max = 7)
            - evalScript: ${output.total = 0}

            - repeat:
                times: 7
                commands:
                  - runFlow:
                      when:
                        visible:
                          id: "mst-Answer.*"
                          index: ${output.total}
                      commands:
                        - evalScript: ${output.total = output.total + 1}

            # 3. Copy text nếu có multiple
            - evalScript: ${output.hasMultiple = false}
            - evalScript: ${output.copiedText = ""}

            - runFlow:
                when:
                  visible: "Chosen answers:.*"
                commands:
                  - copyTextFrom:
                      text: "Chosen answers:.*"
                  - evalScript: ${output.hasMultiple = true}
                  - evalScript: ${output.copiedText = maestro.copiedText} # Lưu lại text đã copy

            - runScript:
                file: ../Daily/randomAnswer.js
                env:
                  total: ${output.total}
                  hasMultiple: ${output.hasMultiple}
                  copiedText: ${output.copiedText}

            - evalScript: ${output.current  = 0}

            # 5. Click các đáp án đã chọn
            - repeat:
                times: ${output.required}
                commands:
                  - runFlow:
                      commands:
                        - tapOn:
                            id: "mst-Answer.*"
                            # Maestro sẽ giải mã thành output.idx0, output.idx1...
                            index: ${output["idx" + output.current ]}

                  - evalScript: ${output.current  = output.current + 1 }

            - tapOn: "Next"
            - tapOn:
                text: "Start"
                optional: true

      # click icon Submit
      - tapOn: 
          id: game-submit-btn
      # popup Submit
      - assertVisible: SUBMIT
      - tapOn:
          text: Confirm

      - runFlow: ../ClosePopup/ClosePopup.yaml

# back về tab Tests
- tapOn: 
    id: mst-Back

- runFlow: ../ClosePopup/ClosePopup.yaml

- repeat:
    while:
      visible: "Final Tests"
    commands:
      - tapOn:
          id: mst-Back
          optional: true

- runFlow: ../ClosePopup/ClosePopup.yaml
