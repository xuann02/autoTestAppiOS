appId: ${appId}
---
- launchApp:
    appId: ${appId}
- tapOn: 
      text: "Study.*"
      id: home-study-tab-btn
# hiển thị màn passing
- tapOn:
    text: ".*Passing Probability.*"

#  Check hiển thị màn topic
# 1.1 Click 1 topic để vào màn hình topic (app có subtopic)
- tapOn:
    below:
      text: "Passing Probability By Topics"
      index: 0

- tapOn:
    below:
      text: "Improve Overall Score"
      index: 0

# 1.2 Click để hiển thị màn chọn number question topic
- runFlow:
    commands:
      - assertVisible: Pass For The First Time With
      - tapOn: 
          id: iap-close-btn
    optional: true

- runFlow:
    commands:
      # button Cancel màn chọn number question
      - tapOn: Cancel
      - tapOn:
          below:
            text: "Improve Overall Score"
            index: 0

      #  button Start màn chọn number question
      # Default: 20 question
      - tapOn: Start

      # 2. Màn game
      - repeat:
          while:
            notVisible: "SUBMIT"
          commands:
            #  1. Scroll đảm bảo load answer
            - scrollUntilVisible:
                element:
                  id: "mst-Answer.*"
                  index: 0
                direction: DOWN

            # 2. Đếm số đáp án (max = 7)
            - evalScript: ${output.total = 0}

            - repeat:
                times: 7
                commands:
                  - runFlow:
                      when:
                        visible:
                          id: "mst-Answer.*"
                          index: ${output.total}
                      commands:
                        - evalScript: ${output.total = output.total + 1}

            # 3. Copy text nếu có multiple
            - evalScript: ${output.hasMultiple = false}
            - evalScript: ${output.copiedText = ""}

            - runFlow:
                when:
                  visible: "Chosen answers:.*"
                commands:
                  - copyTextFrom:
                      text: "Chosen answers:.*"
                  - evalScript: ${output.hasMultiple = true}
                  - evalScript: ${output.copiedText = maestro.copiedText} # Lưu lại text đã copy

            - runScript:
                file: ../Daily/randomAnswer.js
                env:
                  total: ${output.total}
                  hasMultiple: ${output.hasMultiple}
                  copiedText: ${output.copiedText}

            - evalScript: ${output.current  = 0}

            # 5. Click các đáp án đã chọn
            - repeat:
                times: ${output.required}
                commands:
                  - runFlow:
                      commands:
                        - tapOn:
                            id: "mst-Answer.*"
                            # Maestro sẽ giải mã thành output.idx0, output.idx1...
                            index: ${output["idx" + output.current ]}

                  - evalScript: ${output.current  = output.current + 1 }

            - runFlow: ../ClosePopup/CloseBadge.yaml
            - tapOn: "Next"

      # popup Submit
      - assertVisible: SUBMIT
      - tapOn:
          text: Dismiss

      # Check button Previous
      - repeat:
          while:
            visible: "Previous"
          commands:
            - tapOn: Previous

      # Check icon Submit
      - tapOn: 
          id: game-submit-btn
      - tapOn: Confirm
      # Nếu hiển thị popup thì tắt đi
      - runFlow: ../ClosePopup/ClosePopup.yaml

      # 3. Màn result
      # 3.1 button Continue game
      - tapOn: Continue
      - tapOn: Cancel # Cancel game
      - tapOn: Continue
      - tapOn: Start # Start game

      - repeat:
          times: 3
          commands:
            - scrollUntilVisible:
                element:
                  id: "mst-Answer-Correct"
                direction: DOWN
            - repeat:
                while:
                  notVisible:
                    text: "Explanation:"
                commands:
                  - tapOn:
                      id: "mst-Answer-Correct"

            - runFlow: ../ClosePopup/CloseBadge.yaml
            - tapOn: "Next"
      # Check icon Submit
      - tapOn: 
          id: game-submit-btn
      - tapOn: Confirm
      # Nếu hiển thị popup thì tắt đi
      - runFlow: ../ClosePopup/ClosePopup.yaml

      # 4. back về màn topic (với app có subtopic)
      - tapOn: 
          id: mst-Back

      # Nếu hiển thị popup thì tắt đi
      - runFlow: ../ClosePopup/ClosePopup.yaml

    optional: true
