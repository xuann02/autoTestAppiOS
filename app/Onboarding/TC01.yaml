# 4. Login
- runFlow:
    when:
      visible: "Log In"
    commands:
      - runFlow:
          when:
            visible: "Skip"
          commands:
            - tapOn:
                text: "Skip"
                optional: true
      - runFlow:
          when:
            visible: "Log In" # Nếu đã chuyển màn, chữ "Log In" biến mất, lệnh này sẽ bị bỏ qua
          commands:
            - tapOn:
                text: "Not now"
                optional: true
