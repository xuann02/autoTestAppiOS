# 5.1 không setup
- runFlow:
    when:
      true: ${output.choice == 0}
    commands:
      - tapOn: Not Now

# 5.2 Setup
- runFlow:
    when:
      true: ${output.choice == 1}
    commands:
      - tapOn: Next
