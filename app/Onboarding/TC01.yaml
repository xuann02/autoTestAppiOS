appId: ${appId}
---
- launchApp:
    appId: ${appId}
    clearState: true

- waitForAnimationToEnd
# 1. Start app
- tapOn: Start Now

# 2. Exam date
- assertVisible: When Is Your Exam?
- runScript: randomChoice.js

# 2.1 Không setup Exam
- runFlow:
    when:
      true: ${output.choice == 0}
    commands:
      - tapOn: "I don't know"

# 2.2 Setup Exam
- runFlow:
    when:
      true: ${output.choice == 1}
    commands:
      - tapOn: Next

# 3. Diagnostic
- assertVisible: Diagnostic Test
- tapOn: Not Now
