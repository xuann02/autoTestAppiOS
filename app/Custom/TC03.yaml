appId: ${appId}
---
- launchApp:
    appId: ${appId}
- tapOn: 
    text: "Tests.*"
    id: home-test-tab-btn

- swipe:
    direction: UP

- tapOn:
    text: ".*Custom Test 1.*"
    optional: true
- runFlow:
    commands:
      # hiển thị màn mua
      - assertVisible: Pass For The First Time With
      - tapOn: 
          id: iap-close-btn
    optional: true

- runFlow:
    commands:
      # Check button Previous
      - repeat:
          while:
            visible: "Previous"
          commands:
            - tapOn: Previous

      # click icon Submit
      - tapOn: 
          id: game-submit-btn
      # popup Submit
      - assertVisible: SUBMIT
      - tapOn:
          text: Confirm
      # Có popup thì tắt đi
      - runFlow: ../ClosePopup/ClosePopup.yaml
    optional: true
