appId: ${appId}
---
- launchApp:
    appId: ${appId}
- tapOn: 
    text: "Tests.*"
    id: home-test-tab-btn

- swipe:
    direction: UP

# 1. Check hiển thị Custom test
- assertVisible: "Custom Tests "

# 2. Tạo custom mới
- tapOn: Create
- tapOn: Start

- runFlow:
    commands:
      # hiển thị màn mua
      - assertVisible: Pass For The First Time With
      - tapOn: 
          id: iap-close-btn
      # Back lại màn Tests
      - tapOn: 
          id: mst-Back
    optional: true

- runFlow:
    commands:
      # 3. Màn game
      - repeat:
          while:
            notVisible: "SUBMIT"
          commands:
            - scrollUntilVisible:
                element:
                  id: "mst-Answer.*"
                  index: 0
                direction: DOWN

            # 2. Đếm số đáp án (max = 7)
            - evalScript: ${output.total = 0}

            - repeat:
                times: 7
                commands:
                  - runFlow:
                      when:
                        visible:
                          id: "mst-Answer.*"
                          index: ${output.total}
                      commands:
                        - evalScript: ${output.total = output.total + 1}

            # 3. Copy text nếu có multiple
            - evalScript: ${output.hasMultiple = false}
            - evalScript: ${output.copiedText = ""}

            - runFlow:
                when:
                  visible: "Chosen answers:.*"
                commands:
                  - copyTextFrom:
                      text: "Chosen answers:.*"
                  - evalScript: ${output.hasMultiple = true}
                  - evalScript: ${output.copiedText = maestro.copiedText} # Lưu lại text đã copy

            - runScript:
                file: ../Daily/randomAnswer.js
                env:
                  total: ${output.total}
                  hasMultiple: ${output.hasMultiple}
                  copiedText: ${output.copiedText}

            - evalScript: ${output.current  = 0}

            # 5. Click các đáp án đã chọn
            - repeat:
                times: ${output.required}
                commands:
                  - runFlow:
                      commands:
                        - tapOn:
                            id: "mst-Answer.*"
                            # Maestro sẽ giải mã thành output.idx0, output.idx1...
                            index: ${output["idx" + output.current ]}

                  - evalScript: ${output.current  = output.current + 1 }

            - runFlow: ../ClosePopup/CloseBadge.yaml

            - tapOn: "Next"

      # popup Submit
      - tapOn:
          text: Dismiss

      # Back lại màn Tests
      - tapOn: 
          id: mst-Back
    optional: true
